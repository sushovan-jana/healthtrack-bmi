spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:healthtrack_dev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

healthtrack:
  jwt:
    # Developer fallback secret to bypass bootstrap failures in local dev profile
    secret: "9a2f982181283c8a32d182390f2390a1d9c2830f2930210e39281a30fde20e10"
    # Set to false for local development to allow testing without SSL/HTTPS setup
    cookie-secure: false
