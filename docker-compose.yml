version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: healthtrack-db
    environment:
      POSTGRES_DB: healthtrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d healthtrack"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthtrack-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/healthtrack
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password123
      # Overwrite with secure random keys in real production deployments
      JWT_SECRET: 9a2f982181283c8a32d182390f2390a1d9c2830f2930210e39281a30fde20e10
      JWT_EXPIRATION_MS: 86400000
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
